name: 🚀 RDP555 GOD-MODE (ULTRA WORKSTATION V10.7)

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '🕐 Session Duration'
        required: false
        default: '6h'
        type: choice
        options: ['1h', '3h', '6h']

jobs:
  RDP-Setup:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: 🎯 INITIALIZING GOD-MODE SYSTEM
        run: |
          Write-Host "🚀 STARTING THE MOST POWERFUL RDP CONFIGURATION..." -ForegroundColor Cyan
          exit 0

      - name: 🏎️ ULTIMATE CPU & POWER TWEAKS
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          powercfg /duplicatescheme e9a42b02-d5df-448d-aa00-03f14749eb61
          powercfg /setactive e9a42b02-d5df-448d-aa00-03f14749eb61
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Power\PowerThrottling" /v "PowerThrottlingOff" /t REG_DWORD /d 1 /f
          exit 0

      - name: 🛡️ KILLING WATERMARK (FORCE HIDE)
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          reg add "HKCU\Control Panel\Desktop" /v PaintDesktopVersion /t REG_DWORD /d 0 /f
          bcdedit /set testsigning off
          Stop-Process -Name explorer -Force
          Start-Sleep -Seconds 2
          Start-Process explorer
          exit 0

      - name: 🧠 EXTREME MEMORY MANAGEMENT (32GB VIRTUAL RAM)
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          $pagefile = Get-CimInstance Win32_ComputerSystem
          Set-CimInstance -CimInstance $pagefile -Property @{AutomaticManagedPagefile = $False}
          $pagefileSetting = Get-CimInstance Win32_PageFileSetting
          if ($pagefileSetting) {
              Set-CimInstance -CimInstance $pagefileSetting -Property @{InitialSize = 24576; MaximumSize = 32768}
          } else {
              New-CimInstance -ClassName Win32_PageFileSetting -Property @{Name = "C:\pagefile.sys"; InitialSize = 24576; MaximumSize = 32768}
          }
          exit 0

      - name: 💾 MASSIVE STORAGE CONFIGURATION (48TB TOTAL)
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          @"
          create vdisk file="C:\Disk_34TB.vhd" maximum=35651584 type=expandable
          attach vdisk
          create partition primary
          format fs=ntfs quick label="TITAN_34TB"
          assign letter=E
          create vdisk file="C:\Disk_12TB.vhd" maximum=12582912 type=expandable
          attach vdisk
          create partition primary
          format fs=ntfs quick label="MID_12TB"
          assign letter=F
          create vdisk file="C:\Disk_2TB.vhd" maximum=2097152 type=expandable
          attach vdisk
          create partition primary
          format fs=ntfs quick label="DEV_2TB"
          assign letter=G
          "@ | diskpart
          exit 0

      - name: 📦 INSTALLING DEV TOOLS (AUTO-SETUP)
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          Write-Host "🛠️ Installing VS Code, Node.js, Discord, and Roblox Studio..." -ForegroundColor Yellow
          
          # تثبيت Chocolatey أولاً
          Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          
          # تثبيت البرامج المطلوبة
          choco install vscode nodejs discord -y
          
          # تحميل Roblox Studio بشكل منفصل (لأنه لا يوجد في Choco دائماً بشكل مباشر)
          Invoke-WebRequest -Uri "https://setup.rbxcdn.com/RobloxStudioLauncherBeta.exe" -OutFile "$env:TEMP\RobloxStudio.exe"
          Start-Process "$env:TEMP\RobloxStudio.exe" -ArgumentList "/quiet" -Wait
          
          Write-Host "✅ All tools are installed and ready!" -ForegroundColor Green
          exit 0

      - name: ⚙️ FINALIZING RDP CONFIG
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389 profile=any
          Start-Service TermService
          exit 0

      - name: 👤 CREATING GOD-MODE USER
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          $Password = ConvertTo-SecureString "BASHAR12!" -AsPlainText -Force
          New-LocalUser -Name "rdp555" -Password $Password -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "rdp555"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "rdp555"
          exit 0

      - name: 🌐 TAILSCALE CONNECTION
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          $msiPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msiPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$msiPath`"", "/quiet", "/norestart" -Wait
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=rdp555-godmode
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          Write-Host "🌐 IP: $ip | USER: rdp555 | PASS: BASHAR12!" -ForegroundColor White
          exit 0

      - name: ♾️ KEEP ALIVE
        run: |
          for ($i = 1; $i -le 350; $i++) { Start-Sleep -Seconds 60 }
          exit 0
