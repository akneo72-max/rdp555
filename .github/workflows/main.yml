name: 🚀 RDP555 EXTREME ROCKET MODE (V3)

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '🕐 Session Duration'
        required: false
        default: '6h'
        type: choice
        options: ['1h', '3h', '6h']

jobs:
  RDP-Setup:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: 🎯 INITIALIZING EXTREME SYSTEM
        run: Write-Host "🚀 STARTING ROCKET MODE..." -ForegroundColor Cyan

      - name: 🏎️ HARDWARE & RAM OPTIMIZATION (VIRTUAL RAM BOOST)
        run: |
          Write-Host "🧠 Boosting Virtual RAM and CPU Priority..." -ForegroundColor Yellow
          # زيادة الـ PageFile (الرام الافتراضي) ليعطي ثباتاً في المهام الثقيلة
          wmic computersystem where name="%computername%" set AutomaticManagedPagefile=False
          wmic pagefileset where name="C:\\pagefile.sys" set InitialSize=12288,MaximumSize=16384
          
          # جعل المعالج يركز 100% على البرامج (Background Services Priority)
          reg add "HKLM\System\CurrentControlSet\Control\PriorityControl" /v Win32PrioritySeparation /t REG_DWORD /d 38 /f
          
          # تعطيل استهلاك الرام في الـ Cache غير الضروري
          reg add "HKLM\System\CurrentControlSet\Control\Session Manager\Memory Management" /v LargeSystemCache /t REG_DWORD /d 0 /f
          Write-Host "✅ Hardware Tweaks Applied!" -ForegroundColor Green

      - name: 🧹 TOTAL DEBLOAT (REMOVING EVERYTHING USELESS)
        run: |
          Write-Host "🧹 Stripping Windows to the bone..." -ForegroundColor Yellow
          # إيقاف خدمات التحديث والبحث والتقارير نهائياً
          $kill = @("wuauserv", "bits", "dosvc", "WSearch", "SysMain", "WerSvc", "StiSvc", "Themes")
          foreach($s in $kill) { Stop-Service $s -Force -ErrorAction SilentlyContinue; Set-Service $s -StartupType Disabled }
          
          # إزالة كافة تطبيقات ويندوز المزعجة دفعة واحدة
          Get-AppxPackage -AllUsers | where {$_.Name -notlike "*Calculator*" -and $_.Name -notlike "*Paint*"} | Remove-AppxPackage -ErrorAction SilentlyContinue
          Write-Host "✅ System is now Lightweight!" -ForegroundColor Green

      - name: 🛰️ ZERO-LATENCY NETWORK TWEAKS
        run: |
          Write-Host "📡 Optimizing Network for Rocket Speed..." -ForegroundColor Cyan
          netsh int tcp set global autotuninglevel=disabled
          netsh int tcp set global congestionprovider=ctcp
          netsh int tcp set global ecncapability=enabled
          netsh int tcp set global timestamps=disabled
          # تحسين الـ MTU لتقليل تقطيع الصوت والفيديو
          netsh interface ipv4 set subinterface "Ethernet" mtu=1500 store=persistent
          Write-Host "✅ Network is now optimized!" -ForegroundColor Green

      - name: ⚙️ CONFIGURING RDP (MAX SPEED)
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          # إخفاء علامة Test Mode بأمر قوي
          bcdedit /set {current} testsigning off
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389 profile=any
          Start-Service TermService -ErrorAction SilentlyContinue

      - name: 👤 CREATING USER
        run: |
          $Password = ConvertTo-SecureString "BASHAR12!" -AsPlainText -Force
          New-LocalUser -Name "rdp555" -Password $Password -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "rdp555"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "rdp555"

      - name: 🌐 TAILSCALE CONNECTION
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          $msiPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msiPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$msiPath`"", "/quiet", "/norestart" -Wait
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=rdp555-rocket
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          Write-Host "🌐 IP: $ip | USER: rdp555 | PASS: BASHAR12!" -ForegroundColor White

      - name: ♾️ KEEP ALIVE
        run: for ($i = 1; $i -le 350; $i++) { Start-Sleep -Seconds 60 }
