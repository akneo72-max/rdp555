name: 🚀 RDP555 ULTIMATE PERFORMANCE (MAX POWER)

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '🕐 Session Duration'
        required: false
        default: '6h'
        type: choice
        options: ['1h', '3h', '6h']

jobs:
  RDP-Setup:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: 🎯 INITIALIZING MAX POWER SYSTEM
        run: Write-Host "🚀 STARTING ULTIMATE PERFORMANCE MODE..." -ForegroundColor Cyan

      - name: ⚡ ENABLING ULTIMATE PERFORMANCE & KILLING BATTERY LIMITS
        run: |
          Write-Host "🔋 Disabling Power Saving & Enabling Ultimate Performance..." -ForegroundColor Yellow
          
          # 1. تفعيل خطة "الأداء الأقصى" المخفية
          powercfg /duplicatescheme e9a42b02-d5df-448d-aa00-03f14749eb61
          powercfg /setactive e9a42b02-d5df-448d-aa00-03f14749eb61
          
          # 2. تعطيل وضع السكون والسبات تماماً
          powercfg /x -hibernate-timeout-ac 0
          powercfg /x -sleep-timeout-ac 0
          powercfg /hibernate off
          
          # 3. منع المعالج من خفض الأداء (Disable Power Throttling)
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Power\PowerThrottling" /v "PowerThrottlingOff" /t REG_DWORD /d 1 /f
          
          # 4. ضبط النظام "لأفضل أداء" (Adjust for Best Performance)
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" /v VisualFXSetting /t REG_DWORD /d 2 /f
          
          Write-Host "✅ System is now on MAX POWER!" -ForegroundColor Green

      - name: 🧠 EXTREME RAM & CPU TUNING
        run: |
          Write-Host "🧠 Tuning Memory & CPU for Zero Lag..." -ForegroundColor Yellow
          # زيادة الرام الافتراضي إلى 20GB
          wmic computersystem where name="%computername%" set AutomaticManagedPagefile=False
          wmic pagefileset where name="C:\\pagefile.sys" set InitialSize=16384,MaximumSize=20480
          
          # تحسين جدولة المهام لسرعة الاستجابة
          reg add "HKLM\System\CurrentControlSet\Control\PriorityControl" /v Win32PrioritySeparation /t REG_DWORD /d 38 /f
          Write-Host "✅ Memory & CPU Tuned!" -ForegroundColor Green

      - name: 💾 CREATING GIANT STORAGE DISKS (34TB, 12TB, 2TB)
        run: |
          @"
          create vdisk file="C:\Disk_34TB.vhd" maximum=35651584 type=expandable
          attach vdisk
          create partition primary
          format fs=ntfs quick label="ULTRA_STORAGE_34TB"
          assign letter=E
          create vdisk file="C:\Disk_12TB.vhd" maximum=12582912 type=expandable
          attach vdisk
          create partition primary
          format fs=ntfs quick label="MID_STORAGE_12TB"
          assign letter=F
          create vdisk file="C:\Disk_2TB.vhd" maximum=2097152 type=expandable
          attach vdisk
          create partition primary
          format fs=ntfs quick label="STORAGE_2TB"
          assign letter=G
          "@ | diskpart

      - name: 🧹 SYSTEM CLEANUP (DEBLOAT)
        run: |
          Write-Host "🧹 Removing background clutter..." -ForegroundColor Yellow
          $kill = @("wuauserv", "bits", "dosvc", "WSearch", "SysMain", "WerSvc", "Themes")
          foreach($s in $kill) { Stop-Service $s -Force -ErrorAction SilentlyContinue; Set-Service $s -StartupType Disabled }
          Write-Host "✅ Background services cleared!" -ForegroundColor Green

      - name: ⚙️ CONFIGURING RDP (LOW LATENCY)
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          bcdedit /set {current} testsigning off
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389 profile=any
          Start-Service TermService -ErrorAction SilentlyContinue

      - name: 👤 CREATING USER
        run: |
          $Password = ConvertTo-SecureString "BASHAR12!" -AsPlainText -Force
          New-LocalUser -Name "rdp555" -Password $Password -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "rdp555"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "rdp555"

      - name: 🌐 TAILSCALE CONNECTION
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          $msiPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msiPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$msiPath`"", "/quiet", "/norestart" -Wait
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=rdp555-max
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          Write-Host "🌐 IP: $ip | USER: rdp555 | PASS: BASHAR12!" -ForegroundColor White

      - name: ♾️ KEEP ALIVE
        run: for ($i = 1; $i -le 350; $i++) { Start-Sleep -Seconds 60 }
