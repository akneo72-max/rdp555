name: 🚀 RDP555 CLEAN INTERFACE (NO TEST MODE)

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '🕐 Session Duration'
        required: false
        default: '6h'
        type: choice
        options: ['1h', '3h', '6h']

jobs:
  RDP-Setup:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: 🎯 INITIALIZING CLEAN SYSTEM
        run: Write-Host "🚀 STARTING CLEAN INTERFACE MODE..." -ForegroundColor Cyan

      - name: 🛡️ KILLING TEST MODE WATERMARK (THE SMART WAY)
        run: |
          Write-Host "🚫 Hiding Test Mode Watermark..." -ForegroundColor Yellow
          
          # 1. محاولة تعطيلها عبر السجل (Registry)
          reg add "HKCU\Control Panel\Desktop" /v PaintDesktopVersion /t REG_DWORD /d 0 /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" /v EnableLUA /t REG_DWORD /d 0 /f
          
          # 2. أمر bcdedit الأساسي (للاحتياط)
          bcdedit /set testsigning off
          
          # 3. سكربت لتحديث سطح المكتب والمستكشف فوراً لإخفاء العلامة
          Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 2
          Start-Process explorer
          
          Write-Host "✅ Watermark should be hidden now!" -ForegroundColor Green

      - name: 🏎️ APPLYING PRO PERFORMANCE TWEAKS
        run: |
          Write-Host "⚡ Applying Lightning Speed Tweaks..." -ForegroundColor Cyan
          powercfg /setactive e9a42b02-d5df-448d-aa00-03f14749eb61
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\PriorityControl" /v Win32PrioritySeparation /t REG_DWORD /d 38 /f
          # زيادة الرام الافتراضي
          wmic computersystem where name="%computername%" set AutomaticManagedPagefile=False
          wmic pagefileset where name="C:\\pagefile.sys" set InitialSize=16384,MaximumSize=20480

      - name: 💾 CREATING GIANT STORAGE (34TB, 12TB, 2TB)
        run: |
          @"
          create vdisk file="C:\Disk_34TB.vhd" maximum=35651584 type=expandable
          attach vdisk
          create partition primary
          format fs=ntfs quick label="ULTRA_STORAGE_34TB"
          assign letter=E
          create vdisk file="C:\Disk_12TB.vhd" maximum=12582912 type=expandable
          attach vdisk
          create partition primary
          format fs=ntfs quick label="MID_STORAGE_12TB"
          assign letter=F
          create vdisk file="C:\Disk_2TB.vhd" maximum=2097152 type=expandable
          attach vdisk
          create partition primary
          format fs=ntfs quick label="STORAGE_2TB"
          assign letter=G
          "@ | diskpart

      - name: ⚙️ CONFIGURING RDP (ULTRA SPEED)
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389 profile=any
          Start-Service TermService -ErrorAction SilentlyContinue

      - name: 👤 CREATING USER
        run: |
          $Password = ConvertTo-SecureString "BASHAR12!" -AsPlainText -Force
          New-LocalUser -Name "rdp555" -Password $Password -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "rdp555"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "rdp555"

      - name: 🌐 TAILSCALE CONNECTION
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          $msiPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msiPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$msiPath`"", "/quiet", "/norestart" -Wait
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=rdp555-clean
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          Write-Host "🌐 IP: $ip | USER: rdp555 | PASS: BASHAR12!" -ForegroundColor White

      - name: ♾️ KEEP ALIVE
        run: for ($i = 1; $i -le 350; $i++) { Start-Sleep -Seconds 60 }
