name: 🚀 RDP555 DEV-WORKSTATION (ROBLOX STUDIO READY)

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '🕐 Session Duration'
        required: false
        default: '6h'
        type: choice
        options: ['1h', '3h', '6h']

jobs:
  RDP-Setup:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: 🎯 INITIALIZING DEVELOPER MODE
        run: Write-Host "🚀 STARTING DEV-WORKSTATION FOR PROGRAMMERS..." -ForegroundColor Cyan

      - name: 🛠️ SYSTEM CORE OPTIMIZATION (FOR HEAVY APPS)
        run: |
          Write-Host "🧠 Reconfiguring System for Heavy Development..." -ForegroundColor Yellow
          # جعل المعالج يركز على التطبيقات الأمامية (Roblox Studio) بنسبة 100%
          reg add "HKLM\System\CurrentControlSet\Control\PriorityControl" /v Win32PrioritySeparation /t REG_DWORD /d 26 /f
          
          # تفعيل "Hardware Acceleration" للبرامج عبر المعالج (Software Emulation)
          reg add "HKCU\Software\Microsoft\Avalon.Graphics" /v DisableHWAcceleration /t REG_DWORD /d 0 /f
          
          # زيادة الـ RAM الافتراضي إلى أقصى حد ممكن لتجنب الـ Crash
          wmic computersystem where name="%computername%" set AutomaticManagedPagefile=False
          wmic pagefileset where name="C:\\pagefile.sys" set InitialSize=16384,MaximumSize=20480
          Write-Host "✅ System Cores Optimized!" -ForegroundColor Green

      - name: 💾 CREATING GIANT STORAGE DISKS (34TB, 12TB, 2TB)
        run: |
          # إنشاء الأقراص كما طلبت سابقاً لتنظيم مشاريع البرمجة
          @"
          create vdisk file="C:\Disk_34TB.vhd" maximum=35651584 type=expandable
          attach vdisk
          create partition primary
          format fs=ntfs quick label="ULTRA_STORAGE_34TB"
          assign letter=E
          create vdisk file="C:\Disk_12TB.vhd" maximum=12582912 type=expandable
          attach vdisk
          create partition primary
          format fs=ntfs quick label="MID_STORAGE_12TB"
          assign letter=F
          create vdisk file="C:\Disk_2TB.vhd" maximum=2097152 type=expandable
          attach vdisk
          create partition primary
          format fs=ntfs quick label="STORAGE_2TB"
          assign letter=G
          "@ | diskpart

      - name: 🏎️ EXTREME GRAPHICS & NETWORK TWEAKS
        run: |
          Write-Host "📡 Reducing Latency for Remote Control..." -ForegroundColor Cyan
          # تقليل تأخير الشبكة لأقصى حد لضمان سلاسة حركة الماوس
          netsh int tcp set global autotuninglevel=experimental
          netsh int tcp set global congestionprovider=ctcp
          
          # إيقاف كافة التأثيرات البصرية في ويندوز لتوفير الجهد لـ Roblox Studio
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" /v VisualFXSetting /t REG_DWORD /d 2 /f
          Write-Host "✅ Graphics Emulation Ready!" -ForegroundColor Green

      - name: ⚙️ CONFIGURING RDP (ULTRA SPEED)
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          bcdedit /set {current} testsigning off
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389 profile=any
          Start-Service TermService -ErrorAction SilentlyContinue

      - name: 👤 CREATING USER
        run: |
          $Password = ConvertTo-SecureString "BASHAR12!" -AsPlainText -Force
          New-LocalUser -Name "rdp555" -Password $Password -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "rdp555"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "rdp555"

      - name: 🌐 TAILSCALE CONNECTION
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          $msiPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msiPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$msiPath`"", "/quiet", "/norestart" -Wait
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=rdp555-dev
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          Write-Host "🌐 IP: $ip | USER: rdp555 | PASS: BASHAR12!" -ForegroundColor White

      - name: ♾️ KEEP ALIVE
        run: for ($i = 1; $i -le 350; $i++) { Start-Sleep -Seconds 60 }
