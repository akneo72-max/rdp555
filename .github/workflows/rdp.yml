name: 🚀 RDP555 HIGH PERFORMANCE

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '🕐 Session Duration'
        required: false
        default: '6h'
        type: choice
        options:
        - '1h'
        - '3h'
        - '6h'

jobs:
  RDP-Setup:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: 🎯 INITIALIZING SYSTEM
        run: |
          Write-Host "🤖 RDP555 SYSTEM STARTING" -ForegroundColor Yellow
          Write-Host "🕒 Duration: ${{ github.event.inputs.duration }}" -ForegroundColor Magenta
          Write-Host "✅ System Ready!" -ForegroundColor Green

      - name: 🔧 OPTIMIZING WINDOWS (DEBLOAT)
        run: |
          Write-Host "🛠️ Removing unnecessary features for maximum performance..." -ForegroundColor Yellow
          Set-MpPreference -DisableRealtimeMonitoring $true
          $services = @("SysMain", "DiagTrack", "WSearch")
          foreach($service in $services) {
              Stop-Service -Name $service -Force -ErrorAction SilentlyContinue
              Set-Service -Name $service -StartupType Disabled -ErrorAction SilentlyContinue
          }
          Get-AppxPackage *Microsoft.YourPhone* | Remove-AppxPackage -ErrorAction SilentlyContinue
          Get-AppxPackage *Microsoft.GetHelp* | Remove-AppxPackage -ErrorAction SilentlyContinue
          Write-Host "🚀 Optimization Complete!" -ForegroundColor Green

      - name: ⚙️ CONFIGURING RDP
        run: |
          Write-Host "🛠️ Setting up Remote Desktop..." -ForegroundColor Yellow
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389 profile=any
          Start-Service -Name TermService -ErrorAction SilentlyContinue
          Write-Host "✅ RDP Configured!" -ForegroundColor Green

      - name: 👤 CREATING USER
        run: |
          Write-Host "👤 Creating user 'rdp555' with password 'BASHAR12'..." -ForegroundColor Yellow
          $Password = ConvertTo-SecureString "BASHAR12" -AsPlainText -Force
          New-LocalUser -Name "rdp555" -Password $Password -AccountNeverExpires -Description "High Performance RDP User"
          Add-LocalGroupMember -Group "Administrators" -Member "rdp555"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "rdp555"
          Write-Host "✅ User created and added to Admin group!" -ForegroundColor Green

      - name: 🌐 SETTING UP NETWORK (TAILSCALE)
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          if (-not $env:TAILSCALE_AUTH_KEY) {
              Write-Host "❌ Error: TAILSCALE_AUTH_KEY secret is missing!" -ForegroundColor Red
              Write-Host "💡 Please add your Tailscale Auth Key in Repository Settings > Secrets > Actions" -ForegroundColor Yellow
              exit 1
          }
          Write-Host "🌐 Installing Tailscale..." -ForegroundColor Yellow
          $msiPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msiPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$msiPath`"", "/quiet", "/norestart" -Wait
          Start-Sleep -Seconds 5
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=rdp555-server --accept-routes
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          Write-Host "✅ Connection Ready!" -ForegroundColor Green
          Write-Host "------------------------------------------" -ForegroundColor Cyan
          Write-Host "🌐 IP ADDRESS: $ip" -ForegroundColor White
          Write-Host "👤 USERNAME: rdp555" -ForegroundColor White
          Write-Host "🔐 PASSWORD: BASHAR12" -ForegroundColor White
          Write-Host "------------------------------------------" -ForegroundColor Cyan

      - name: ♾️ KEEP ALIVE
        run: |
          $duration = "${{ github.event.inputs.duration }}"
          if ($duration -eq "1h") { $limit = 60 }
          elseif ($duration -eq "3h") { $limit = 180 }
          else { $limit = 350 }
          Write-Host "🚀 RDP is running. Keeping alive for $limit minutes..." -ForegroundColor Green
          for ($i = 1; $i -le $limit; $i++) {
              Write-Host "🕒 Time elapsed: $i minutes. RDP is active."
              Start-Sleep -Seconds 60
          }
